function simulateProgress(barId, textId){
let progress = 0;

return new Promise(resolve => {    
    const interval = setInterval(() => {    
        progress += Math.random() * 15;    

        if(progress >= 90){    
            progress = 90;    
            clearInterval(interval);    
        }    

        document.getElementById(barId).style.width = progress + "%";    
        document.getElementById(textId).innerText = Math.floor(progress) + "%";    
    }, 200);    

    resolve(() => {    
        document.getElementById(barId).style.width = "100%";    
        document.getElementById(textId).innerText = "100%";    
    });    
});

}

  .orderBy("updatedAt", "desc")
  .onSnapshot(snapshot => {    
    console.log("✅ Firestore berhasil connect");  

    mods = [];

    snapshot.forEach(doc => {    
      const data = doc.data();

      mods.push({    
        id: doc.id,    
        ...data,
        updatedAt: data.updatedAt || data.createdAt || 0,
        images: data.images || [data.image]    
      });    
    });

    applyFilter();    

  }, err => {  
    console.error("❌ Firestore error:", err);  
  });
}

function loadEditList(){
editList.innerHTML = "";

mods.forEach((mod, index) => {      
    const div = document.createElement("div");      

    div.innerHTML = `      
        <div style="margin-bottom:10px; padding:10px; border:1px solid #ddd; border-radius:8px;">      
            <b>${mod.title}</b><br>      
            <small>${mod.category}</small><br>      
            <button onclick="selectEdit(${index})">Edit</button>      
            <button onclick="deleteMod(${index})">Hapus</button>      
        </div>      
    `;      

    editList.appendChild(div);      
});

}

function selectEdit(index){
editIndex = index;
const mod = mods[index];

editTitle.value = mod.title;    
editDesc.value = mod.desc;    
editCategory.value = mod.category;    
editLink.value = mod.link;    

// pindah panel    
editPanel.style.display = "none";    
editFormPanel.style.display = "block";

}

function closeEditForm(){
editFormPanel.style.display = "none";
editPanel.style.display = "block";
editIndex = null;
}

async function deleteMod(index){
const mod = mods[index];

if(confirm("Yakin mau hapus mod ini?")){      
    await db.collection("mods").doc(mod.id).delete();      
  
    alert("Mod berhasil dihapus!");      
    loadModsRealtime();      
    loadEditList();      
}

}

async function updateMod(){
if(editIndex === null) return alert("Pilih mod dulu!");

loadingOverlay.style.display = "flex";

const mod = mods[editIndex];  

let finalImages = [...mod.images];  

editUploadedImages.forEach((img, i) => {  
    if(img !== null){  
        finalImages[i] = img;  
    }  
});  

await db.collection("mods").doc(mod.id).update({  
    title: editTitle.value,  
    desc: editDesc.value,  
    category: editCategory.value,  
    link: editLink.value,  
    images: finalImages,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
});

loadingOverlay.style.display = "none";

successPopup.style.display = "block";
successPopup.style.transform = "translate(-50%, -50%) scale(1)";

setTimeout(() => {
    successPopup.style.display = "none";
}, 3000);

editUploadedImages = [null, null, null, null];
}

/* CARD */
function createCard(mod){
const d=document.createElement("div");
d.className="card";
// Menambahkan onerror agar jika gambar rusak, tidak kosong melompong
d.innerHTML=`
<div class="thumb">
<img   
loading="lazy"  
decoding="async"  
src="${mod.images[0] || 'https://via.placeholder.com/300x169?text=No+Image'}"  
onload="this.style.opacity=1"  
onerror="this.src='https://via.placeholder.com/300x169?text=Error'"  
style="opacity:0; transition:0.3s;">

</div>    
    <div class="card-content">      
        <span class="badge">${mod.category}</span>      
        <h4 style="margin:5px 0">${mod.title}</h4>      
        <p style="font-size:12px; color:#666">${mod.desc}</p>      
        <button class="download-btn" onclick="openDetail(${mods.indexOf(mod)})">View</button>      
    </div>`;      
    console.log("IMG:", mod.images);      
    const img = new Image();  
img.src = mod.images[0];  
    return d;      
}      /* FILTER */
function applyFilter(){
let f=mods;

if(currentCategory!=="ALL"){      
    f=f.filter(m=>m.category===currentCategory);      
}      
  
const k=search.value.toLowerCase();      
f=f.filter(m=>m.title.toLowerCase().includes(k)||m.desc.toLowerCase().includes(k));      
  
renderMods(f);

}

function renderMods(data) {
const fragment = document.createDocumentFragment(); // Wadah sementara di memori
modsList.innerHTML = "";

data.forEach(m => {    
    fragment.appendChild(createCard(m));    
});    
    
modsList.appendChild(fragment); // Render ke layar cuma 1 kali

}

function openDetail(index){
const mod = mods[index];

detailPanel.style.display = "block";    

// 🔥 FIX SCROLL KE ATAS  
detailPanel.scrollTop = 0;  
window.scrollTo(0, 0);  

currentImages = mod.images;    
currentIndex = 0;    

updateDetailImage();    

detailTitle.innerText = mod.title;      
detailTitleTop.innerText = mod.title;      
detailDesc.innerText = mod.desc;      
detailCategory.innerText = mod.category;      

document.getElementById("detailDownloadSmall").onclick = () => {  
    window.open(mod.link);  
};

}

detailPanel.addEventListener("click", function(e){
if(!document.getElementById("detailContent").contains(e.target)){
// klik di luar konten → DIABAIKAN
e.stopPropagation();
}
});

function updateDetailImage(){
detailImg.src = currentImages[currentIndex];
}

function closeMenu(){
menuPanel.style.display = "none";
}

function closeUpload(){
uploadPanel.style.display = "none";
menuPanel.style.display = "block";
}

function closeEditPanel(){
editPanel.style.display = "none";
menuPanel.style.display = "block";
}

function nextImg(){
if(currentIndex < currentImages.length - 1){
currentIndex++;
} else {
currentIndex = 0;
}
updateDetailImage();
}

function prevImg(){
if(currentIndex > 0){
currentIndex--;
} else {
currentIndex = currentImages.length - 1;
}
updateDetailImage();
}

/* EVENTS */
let searchTimeout;
search.oninput = () => {
clearTimeout(searchTimeout);
searchTimeout = setTimeout(applyFilter, 150);
};

document.querySelectorAll(".cat").forEach(el=>{
el.onclick=()=>{
currentCategory=el.dataset.cat;
document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
applyFilter();
}
});

function previewImage(input, index, mode="upload"){
const preview = mode === "edit"
  ? document.getElementById("editPreviewImages")
  : document.getElementById("previewImages");

const file = input.files[0];    
if(!file) return;    

const wrapper = document.createElement("div");
wrapper.style.position = "relative";

const img = document.createElement("img");    
img.style.width = "60px";    
img.style.height = "60px";    
img.style.objectFit = "cover";    
img.style.borderRadius = "6px";    
img.src = URL.createObjectURL(file);    

// ICON CEKLIS
const check = document.createElement("div");
check.innerText = "✅";
check.style.position = "absolute";
check.style.top = "2px";
check.style.right = "2px";
check.style.fontSize = "16px";
check.style.display = "none";

wrapper.appendChild(img);
wrapper.appendChild(check);
preview.appendChild(wrapper);

// simpan referensi
wrapper.dataset.index = index;
wrapper.dataset.mode = mode;
}

async function uploadImage(file){
console.log("UPLOAD FILE:", file.name, file.size);

const formData = new FormData();  
formData.append("file", file);  
formData.append("upload_preset", "Hifin_Web");  

try {  
    const res = await fetch("https://api.cloudinary.com/v1_1/dvch9imk2/image/upload", {  
        method: "POST",  
        body: formData  
    });  

    const data = await res.json();  

    console.log("CLOUDINARY RESPONSE:", data);  

    if(!res.ok){  
        throw new Error(data.error?.message || "Upload gagal");  
    }  

    return data.secure_url;  

} catch(err){  
    console.error("UPLOAD ERROR:", err);  
    throw err;  
}

}

function delay(ms){
return new Promise(res => setTimeout(res, ms));
}

async function processQueue(type = "upload"){
if(isUploading) return;
isUploading = true;

while(uploadQueue.length > 0){  
    const { file, index, mode } = uploadQueue.shift();  

    const barId = (mode === "edit" ? "editProgress" : "progress") + (index + 1);  
    const textId = (mode === "edit" ? "editProgressText" : "progressText") + (index + 1);  

    document.getElementById(textId).innerText = "Uploading...";  

    try {  
        const url = await uploadImage(file);  

        if(mode === "edit"){  
            editUploadedImages[index] = url;  
        } else {  
            uploadedImages[index] = url;  
        }  
        
        // tampilkan ceklis
const container = mode === "edit"
  ? "#editPreviewImages"
  : "#previewImages";

document.querySelectorAll(container + " > div").forEach(w => {
    const idx = parseInt(w.dataset.index);
    const m = w.dataset.mode;

    if(idx === index && m === mode){
        const check = w.querySelector("div:last-child");
        if(check) check.style.display = "block";
    }
});

document.getElementById(barId).style.width = "100%";  
document.getElementById(textId).innerText = "100%";

    } catch(err){  
        document.getElementById(textId).innerText = "Error";  
    }  

    await delay(1000); // ⏱️ delay antar upload  
}  

isUploading = false;  
checkUploadDone();

}

function checkUploadDone(){
const uploadReady = uploadedImages.some(x => x !== null);
const editReady = editUploadedImages.some(x => x !== null);

const saveBtn = document.querySelector("button[onclick='saveMod()']");
const updateBtn = document.querySelector("button[onclick='updateMod()']");

if(saveBtn){  
    saveBtn.disabled = !uploadReady || isUploading;  
}  

// 🔥 FIX DI SINI
if(updateBtn){  
    updateBtn.disabled = isUploading;  
}
}

// UPLOAD PANEL
image1.onchange = () => {
previewImage(image1, 0, "upload");
uploadQueue.push({ file: image1.files[0], index: 0, mode: "upload" });
processQueue();
};

image2.onchange = () => {
previewImage(image2, 1, "upload");
uploadQueue.push({ file: image2.files[0], index: 1, mode: "upload" });
processQueue();
};

image3.onchange = () => {
previewImage(image3, 2, "upload");
uploadQueue.push({ file: image3.files[0], index: 2, mode: "upload" });
processQueue();
};

image4.onchange = () => {
previewImage(image4, 3, "upload");
uploadQueue.push({ file: image4.files[0], index: 3, mode: "upload" });
processQueue();
};

// EDIT PANEL
editImage1.onchange = () => {
previewImage(editImage1, 0, "edit");
uploadQueue.push({ file: editImage1.files[0], index: 0, mode: "edit" });
processQueue();
};

uploadQueue.push({ file: editImage2.files[0], index: 1, mode: "edit" });
processQueue();
};

editImage3.onchange = () => {
previewImage(editImage3, 2, "edit");
uploadQueue.push({ file: editImage3.files[0], index: 2, mode: "edit" });
processQueue();
};

editImage4.onchange = () => {
previewImage(editImage4, 3, "edit");
uploadQueue.push({ file: editImage4.files[0], index: 3, mode: "edit" });
processQueue();
};

const editPanel = document.getElementById("editPanel");
const editFormPanel = document.getElementById("editFormPanel");

/* INIT LOAD */
checkUploadDone();

/* INTRO */
const app = document.getElementById("app");

window.addEventListener("load", () => {
setTimeout(() => {
document.querySelector(".main").style.display = "none";
app.classList.add("show");

// 🔥 Tambahin ini  
    loadModsRealtime();  

}, 5500);

});
