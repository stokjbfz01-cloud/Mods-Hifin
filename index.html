/* SAVE KE FIREBASE */    
async function saveMod(){    
    const files = [  
        image1.files[0],  
        image2.files[0],  
        image3.files[0],  
        image4.files[0]  
    ].filter(f => f);  
  
    if(files.length === 0) return alert("Pilih minimal 1 gambar!");  
  
    const btn = document.querySelector("button[onclick='saveMod()']");  
    btn.innerText = "Uploading...";  
    btn.disabled = true;  
  
    try {  
        let imageUrls = [];  
  
        for(let i = 0; i < files.length; i++){

            const done = await simulateProgress(

        uploadPanel.style.display = "none";  
        loadModsRealtime();

// helper  
function toBase64(file){  
    return new Promise((resolve, reject)=>{  
        const reader = new FileReader();  
        reader.onload = () => resolve(reader.result.split(',')[1]);  
        reader.onerror = reject;  
        reader.readAsDataURL(file);  
    });  
}  
  
function simulateProgress(barId, textId){  
    let progress = 0;  
  
    return new Promise(resolve => {  
        const interval = setInterval(() => {  
            progress += Math.random() * 15;  
  
            if(progress >= 90){  
                progress = 90;  
                clearInterval(interval);  
            }  
  
            document.getElementById(barId).style.width = progress + "%";  
            document.getElementById(textId).innerText = Math.floor(progress) + "%";  
        }, 200);  
  
        resolve(() => {  
            document.getElementById(barId).style.width = "100%";  
            document.getElementById(textId).innerText = "100%";  
        });  
    });  
}

                id: doc.id,  
                ...doc.data(),  
                images: doc.data().images || [doc.data().image]

        });  
  
        applyFilter();

async function updateMod(){  
    if(editIndex === null) return alert("Pilih mod dulu!");  
  
    const mod = mods[editIndex];  
    let imageUrls = mod.images;  
  
    const files = [  
    editImage1.files[0],  
    editImage2.files[0],  
    editImage3.files[0],  
    editImage4.files[0]  
].filter(f => f);  
  
    if(files.length > 0){  
        imageUrls = [];  
  
        for(let i=0; i<files.length; i++){  
    const file = files[i];  
  
    const done = await simulateProgress(  
    "editProgress" + (i + 1),  
    "editProgressText" + (i + 1)  
);  
            const url = await uploadImage(file);  
imageUrls.push(url);  
            done();  
        }  
    }  
  
    await db.collection("mods").doc(mod.id).update({  
        title: editTitle.value,  
        desc: editDesc.value,  
        category: editCategory.value,  
        link: editLink.value,  
        images: imageUrls  
    });  
  
    alert("Mod berhasil diupdate!");  
  
    editIndex = null;  
    loadModsRealtime();  
    loadEditList();  
}

        title: editTitle.value,  
        desc: editDesc.value,  
        category: editCategory.value,

    });  
  
    alert("Mod berhasil diupdate!");  
  
    editIndex = null;  
  
    loadModsRealtime();  
    loadEditList();  
}

    d.innerHTML=`    
    <div class="thumb">

</div>

    const k=search.value.toLowerCase();    
    f=f.filter(m=>m.title.toLowerCase().includes(k)||m.desc.toLowerCase().includes(k));    
    
    renderMods(f);    
}

    });

  function previewImage(input){

    img.style.width = "60px";

async function uploadImage(file, retry = 2){  
    console.log("UPLOAD FILE:", file.name, file.size);  
    const base64 = await toBase64(file);  
  
    for(let i = 0; i <= retry; i++){  
        try{  
            const res = await fetchWithTimeout("https://api.imgbb.com/1/upload?key=75b94064750b4a3974e1e5f4fb780a08", {  
                method: "POST",  
                headers: {  
                    "Content-Type": "application/x-www-form-urlencoded"  
                },  
                body: new URLSearchParams({  
                    image: base64  
                })  
            });  
  
            if(!res.ok){  
                throw new Error("HTTP ERROR: " + res.status);  
            }  
  
            const data = await res.json();  
              
            console.log("IMG RESPONSE:", data);  
  
            if(!data.success){  
                throw new Error("IMG FAIL");  
            }  
  
            return data.data.display_url;  
  
        } catch(err){  
            console.error("UPLOAD ERROR:", err);  
  
            if(i === retry) throw err;  
        }  
    }  
}  
  
function fetchWithTimeout(url, options, timeout = 15000){  
    return Promise.race([  
        fetch(url, options),  
        new Promise((_, reject) =>  
            setTimeout(() => reject(new Error("Timeout")), timeout)  
        )  
    ]);  
}
