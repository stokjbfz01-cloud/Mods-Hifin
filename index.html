<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;

  background: linear-gradient(270deg, #e3f2fd, #bbdefb, #90caf9, #e3f2fd);
  background-size: 600% 600%;
  animation: gradientMove 6s ease infinite;
}

body::before {
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background: radial-gradient(circle, rgba(66,165,245,0.25), transparent 70%);
  animation: floatBg 15s linear infinite;
  z-index:-1;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;

  animation: introFadeOut 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  animation-delay: 3.5s;
}

/* WELCOME TEXT → PUTIH TANPA GRADIENT */
.brand-intro {
  font-size: 35px;
  font-weight: 1000;
  letter-spacing: 5px;

  color: #ffffff; /* ← FIX PUTIH */
  background: none; /* ← HILANGKAN GRADIENT */

  opacity: 0;
  transform: scale(0.8);

  animation: brandReveal 3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

/* MAIN */
.main {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  opacity: 0;
  transform: scale(1.05);
  filter: blur(10px);

  animation: revealMain 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  animation-delay: 3.7s;
}

/* CONTAINER */
.container {
  text-align: center;
  padding: 25px;
  border-radius: 20px;

  background: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* TITLE → TRANSPARAN IKUT BACKGROUND */
.title {
  font-size: 35px;
  font-weight: 1000;

  background: linear-gradient(270deg, #e3f2fd, #bbdefb, #90caf9, #e3f2fd);
  background-size: 600% 600%;
  animation: gradientMove 6s ease infinite;

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  font-size: 11px;
  color: #555;
  margin-top: 8px;
}

/* ANIMATIONS */

@keyframes brandReveal {
  0% {
    opacity: 0;
    transform: scale(0.7);
    filter: blur(15px);
  }

  40% {
    opacity: 1;
    transform: scale(1.05);
    filter: blur(0);
  }

  100% {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes revealMain {
  0% {
    opacity: 0;
    transform: scale(1.08) translateY(30px);
    filter: blur(15px);
  }

  100% {
    opacity: 1;
    transform: scale(1) translateY(0);
    filter: blur(0);
  }
}

@keyframes introFadeOut {
  to {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes floatBg {
  0% { transform:translate(0,0); }
  50% { transform:translate(50px,50px); }
  100% { transform:translate(0,0); }
}

</style>
</head>

<body>

<div class="intro">
  <div class="brand-intro">WELCOME TO</div>
</div>

<div class="main">
  <div class="container">
    <div class="title">HiFin Mods⚙️</div>
    <div class="subtitle">Berbagai Mods Gratis Yang Menarik✅</div>
  </div>
</div>

</body>
</html>
